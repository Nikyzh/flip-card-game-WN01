<html lang="zh-CN" data-qb-installed="true" data-immersive-translate-page-theme="light"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>外刊好句翻翻卡</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #6C5CE7;
  --primary-light: #A29BFE;
  --primary-bg: #F5F3FF;
  --success: #00B894;
  --success-bg: #E8FBF5;
  --danger: #E17055;
  --danger-bg: #FFF0EC;
  --ink-red: #C0392B;
  --ink-blue: #2980B9;
  --ink-green: #27AE60;
  --bg: #F4F2EF;
  --card: #FFFFFF;
  --text: #2C3E50;
  --text-light: #7F8C8D;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 16px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* 顶部 */
.top-bar {
  background: var(--card);
  padding: 16px 20px 12px;
  text-align: center;
  border-bottom: 1px solid #E8E4DF;
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-bar h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
}
.top-bar .subtitle {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 2px;
}

/* 模式切换 */
.mode-tabs {
  display: flex;
  background: var(--card);
  margin: 12px 16px;
  border-radius: 12px;
  padding: 3px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.mode-tab {
  flex: 1;
  text-align: center;
  padding: 10px 6px 8px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  color: var(--text-light);
  position: relative;
}
.mode-tab.active {
  background: var(--primary);
  color: white;
  box-shadow: 0 2px 8px rgba(108,92,231,0.25);
}
.mode-tab .tab-icon { font-size: 17px; display: block; margin-bottom: 2px; }
.mode-tab .badge {
  position: absolute;
  top: 2px; right: 10px;
  background: var(--danger);
  color: white;
  font-size: 10px;
  min-width: 16px; height: 16px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}

/* ===== 学习模式 ===== */
.study-container { padding: 0 16px 100px; }

.progress-bar-wrap {
  margin: 4px 0 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text-light);
}
.progress-bar {
  flex: 1; height: 4px;
  background: #E8E4DF;
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* 翻转卡片 */
.card-scene {
  perspective: 1000px;
  width: 100%;
  height: 340px;
  margin-bottom: 16px;
}
.card-flip {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
}
.card-flip.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  width: 100%; height: 100%;
  backface-visibility: hidden;
  border-radius: var(--radius);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  box-shadow: var(--shadow);
  overflow-y: auto;
}

/* 正面 */
.card-front {
  background: var(--card);
  border: 1px solid #ECE8E1;
}
.card-front .label {
  font-size: 12px;
  color: var(--primary);
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 14px;
  background: var(--primary-bg);
  padding: 4px 14px;
  border-radius: 20px;
}
.card-front .concept {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.card-front .common-expr {
  font-size: 18px;
  color: var(--ink-blue);
  font-weight: 600;
  padding: 6px 16px;
  background: rgba(41,128,185,0.06);
  border-radius: 8px;
  border-left: 3px solid var(--ink-blue);
  margin-top: 6px;
}
.card-front .tap-hint {
  position: absolute;
  bottom: 14px;
  font-size: 12px;
  color: #BDC3C7;
}

/* 反面 */
.card-back {
  background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
  color: white;
  transform: rotateY(180deg);
}
.card-back .label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 14px;
  background: rgba(255,255,255,0.2);
  padding: 4px 14px;
  border-radius: 20px;
}
.card-back .sentence {
  font-size: 18px;
  line-height: 1.65;
  font-weight: 500;
  margin-bottom: 14px;
}
.card-back .highlight {
  background: rgba(255,255,255,0.22);
  padding: 1px 5px;
  border-radius: 4px;
  font-weight: 700;
  text-decoration: underline;
  text-decoration-color: rgba(255,255,255,0.5);
  text-underline-offset: 2px;
}
.card-back .translation {
  font-size: 14px;
  opacity: 0.82;
  line-height: 1.5;
}
.card-back .source-tag {
  position: absolute;
  bottom: 14px;
  font-size: 11px;
  opacity: 0.5;
  background: rgba(255,255,255,0.15);
  padding: 3px 10px;
  border-radius: 10px;
}

/* 学习按钮 */
.study-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 14px;
}
.study-btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.study-btn:active { transform: scale(0.96); }
.btn-know { background: var(--success); color: white; }
.btn-dunno { background: var(--danger); color: white; }

.nav-buttons {
  display: flex;
  gap: 14px;
  justify-content: center;
}
.nav-btn {
  width: 46px; height: 46px;
  border: 1.5px solid #E0DCD5;
  background: var(--card);
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  color: #95A5A6;
}
.nav-btn:hover { border-color: var(--primary); color: var(--primary); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }

/* ===== 通关模式 ===== */
.challenge-container { padding: 0 16px 100px; display: none; }

.level-select { margin-bottom: 16px; }
.level-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
}
.level-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.level-btn {
  aspect-ratio: 1;
  border: 1.5px solid #E0DCD5;
  background: var(--card);
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  color: #BDC3C7;
}
.level-btn.unlocked { border-color: var(--primary-light); color: var(--primary); }
.level-btn.unlocked:hover { background: var(--primary-bg); }
.level-btn.current { background: var(--primary); color: white; border-color: var(--primary); }
.level-btn.completed { background: var(--success); color: white; border-color: var(--success); }
.level-btn.locked { opacity: 0.35; cursor: not-allowed; }
.level-btn .star { position: absolute; top: -3px; right: -2px; font-size: 11px; }

/* 答题 */
.quiz-area { display: none; }
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.quiz-score {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  background: var(--primary-bg);
  padding: 4px 12px;
  border-radius: 20px;
}
.quiz-progress { font-size: 13px; color: var(--text-light); }

.quiz-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  text-align: center;
  border: 1px solid #ECE8E1;
}
.quiz-card .q-label {
  font-size: 12px;
  color: var(--primary);
  font-weight: 700;
  margin-bottom: 8px;
}
.quiz-card .q-concept { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.quiz-card .q-common { font-size: 16px; color: var(--ink-blue); font-weight: 600; }

.quiz-options { display: flex; flex-direction: column; gap: 10px; align-items: center; }
.quiz-option {
  width: 100%;
  max-width: 320px;
  padding: 14px 20px;
  border: 1.5px solid #E0DCD5;
  background: var(--card);
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.quiz-option:hover { border-color: var(--primary); background: var(--primary-bg); }
.quiz-option.correct {
  border-color: var(--success);
  background: var(--success-bg);
  color: var(--ink-green);
}
.quiz-option.wrong {
  border-color: var(--danger);
  background: var(--danger-bg);
  color: var(--ink-red);
  text-decoration: line-through;
}
.quiz-option:disabled { cursor: default; }

.quiz-feedback {
  margin-top: 14px;
  padding: 14px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  display: none;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct-fb { background: var(--success-bg); color: #1B7A4E; }
.quiz-feedback.wrong-fb { background: var(--danger-bg); color: #A93226; }
.quiz-feedback .fb-label { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.quiz-feedback .fb-sentence { font-weight: 600; margin-bottom: 2px; font-size: 15px; }
.quiz-feedback .fb-translation { opacity: 0.75; font-size: 13px; }

.quiz-next-btn {
  width: 100%;
  padding: 13px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 14px;
  display: none;
  transition: all 0.2s;
}
.quiz-next-btn:active { transform: scale(0.98); }
.quiz-next-btn.show { display: block; }

/* 通关结算 */
.result-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.35);
  z-index: 200;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.result-overlay.show { display: flex; }
.result-card {
  background: var(--card);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  width: 100%;
  max-width: 320px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}
.result-card .result-icon { font-size: 56px; margin-bottom: 10px; }
.result-card .result-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
.result-card .result-score { font-size: 44px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
.result-card .result-detail { font-size: 14px; color: var(--text-light); margin-bottom: 18px; }
.result-card .result-btns { display: flex; gap: 10px; }
.result-card .result-btn {
  flex: 1;
  padding: 11px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.result-btn.primary { background: var(--primary); color: white; }
.result-btn.secondary { background: #F0EDE8; color: var(--text); }

/* 错题本 */
.error-container { padding: 0 16px 100px; display: none; }
.error-empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-light);
}
.error-empty .empty-icon { font-size: 44px; margin-bottom: 10px; }

.error-item {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  border: 1px solid #ECE8E1;
  position: relative;
  border-left: 3px solid var(--danger);
}
.error-item .err-concept { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.error-item .err-sentence { font-size: 14px; color: var(--ink-red); line-height: 1.5; margin-bottom: 4px; font-weight: 500; }
.error-item .err-translation { font-size: 12px; color: var(--text-light); }
.error-item .err-remove {
  position: absolute;
  top: 10px; right: 10px;
  background: none; border: none;
  font-size: 16px; cursor: pointer;
  color: #BDC3C7;
}
.error-item .err-remove:hover { color: var(--danger); }
.error-clear-btn {
  width: 100%;
  padding: 10px;
  background: var(--danger-bg);
  color: var(--danger);
  border: 1px solid rgba(225,112,85,0.2);
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}

.hidden { display: none !important; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.25s ease; }
</style>
</head>

<!-- 学习模式 -->

    <button class="nav-btn" id="nextBtn" onclick="nextCard()">▶</button>
  </div>
</div>

<!-- 通关模式 -->
<div class="challenge-container" id="challengeMode">
  <div class="level-select" id="levelSelect">
    <div class="level-title">🏆 选择关卡</div>
    <div class="level-grid" id="levelGrid"></div>
  </div>
  <div class="quiz-area" id="quizArea">
    <div class="quiz-header">
      <div class="quiz-score" id="quizScore">⭐ 0分</div>

    <div class="progress-bar-wrap">
      <div class="progress-bar"><div class="progress-bar-fill" id="quizProgressBar" style="width:0%"></div></div>
    </div>
    <div class="quiz-card fade-in">
      <div class="q-label">💡 这个意思，外刊怎么说？</div>
      <div class="q-concept" id="quizConcept"></div>
      <div class="q-common" id="quizCommon"></div>
    </div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-feedback" id="quizFeedback">
      <div class="fb-label" id="fbLabel"></div>
      <div class="fb-sentence" id="fbSentence"></div>
      <div class="fb-translation" id="fbTranslation"></div>
    </div>
    <button class="quiz-next-btn" id="quizNextBtn" onclick="nextQuestion()">下一题 ▶</button>
  </div>
</div>

<!-- 错题本 -->
<div class="error-container" id="errorMode">
  <div class="error-empty" id="errorEmpty">
    <div class="empty-icon">🎉</div>
    <div>还没有错题，继续保持！</div>
  </div>
  <div id="errorList"></div>
  <button class="error-clear-btn hidden" id="errorClearBtn" onclick="clearErrors()">🗑️ 清空错题本</button>
</div>

<!-- 通关结算 -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="result-btns">
      <button class="result-btn secondary" onclick="backToLevels()">选关卡</button>
      <button class="result-btn primary" onclick="retryLevel()">再战</button>
    </div>
  </div>
</div>

let currentMode = 'study';
let studyIndex = 0;
let isFlipped = false;
const QUESTIONS_PER_LEVEL = 5;
let currentLevel = 0;
let quizQuestions = [];
let quizIndex = 0;
let quizScoreVal = 0;
let levelScores = {};
let errorBook = [];

function loadState() {
  try {
    const saved = localStorage.getItem('flashcard_v3');
    if (saved) {
      const s = JSON.parse(saved);
      levelScores = s.levelScores || {};
      errorBook = s.errorBook || [];
      studyIndex = s.studyIndex || 0;
    }
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem('flashcard_v3', JSON.stringify({ levelScores, errorBook, studyIndex })); } catch(e) {}
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.mode-tab[data-mode="${mode}"]`).classList.add('active');
  document.getElementById('studyMode').style.display = mode === 'study' ? 'block' : 'none';
  document.getElementById('challengeMode').style.display = mode === 'challenge' ? 'block' : 'none';
  document.getElementById('errorMode').style.display = mode === 'error' ? 'block' : 'none';
  if (mode === 'study') renderStudyCard();
  if (mode === 'challenge') renderLevels();
  if (mode === 'error') renderErrorBook();
}

function renderStudyCard() {
  const c = CARDS[studyIndex];
  document.getElementById('cardConcept').textContent = c.concept;
  document.getElementById('cardCommon').textContent = c.common;
  document.getElementById('cardSentence').innerHTML = c.sentence;
  document.getElementById('cardTranslation').textContent = c.translation;
  document.getElementById('cardSource').textContent = '📖 ' + c.source;
  document.getElementById('studyProgress').textContent = `${studyIndex + 1} / ${CARDS.length}`;
  document.getElementById('studyProgressBar').style.width = `${((studyIndex + 1) / CARDS.length) * 100}%`;
  isFlipped = false;
  document.getElementById('cardFlip').classList.remove('flipped');
  document.getElementById('prevBtn').disabled = studyIndex === 0;
  document.getElementById('nextBtn').disabled = studyIndex === CARDS.length - 1;
}

function flipCard() { isFlipped = !isFlipped; document.getElementById('cardFlip').classList.toggle('flipped'); }
function prevCard() { if (studyIndex > 0) { studyIndex--; saveState(); renderStudyCard(); } }
function nextCard() { if (studyIndex < CARDS.length - 1) { studyIndex++; saveState(); renderStudyCard(); } }
function markCard(known) {
  if (!known && !errorBook.find(e => e.sentencePlain === CARDS[studyIndex].sentencePlain)) {
    errorBook.push({...CARDS[studyIndex]});
    saveState(); updateErrorBadge();
  }
  studyIndex = studyIndex < CARDS.length - 1 ? studyIndex + 1 : 0;
  saveState(); renderStudyCard();
}

function renderLevels() {
  const totalLevels = Math.ceil(CARDS.length / QUESTIONS_PER_LEVEL);
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  for (let i = 0; i < totalLevels; i++) {
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    const completed = levelScores[i] && levelScores[i].completed;
    const prevOk = i === 0 || (levelScores[i-1] && levelScores[i-1].completed);
    if (completed) { btn.classList.add('completed'); btn.innerHTML = `${i+1}<span class="star">⭐</span>`; }
    else if (prevOk) { btn.classList.add('unlocked'); btn.textContent = i + 1; }
    else { btn.classList.add('locked'); btn.textContent = '🔒'; }
    if (prevOk && !completed) btn.onclick = () => startLevel(i);
    grid.appendChild(btn);
  }
  document.getElementById('levelSelect').style.display = 'block';
  document.getElementById('quizArea').style.display = 'none';
}

function startLevel(level) {
  currentLevel = level;
  const start = level * QUESTIONS_PER_LEVEL;
  const end = Math.min(start + QUESTIONS_PER_LEVEL, CARDS.length);
  quizQuestions = [];
  CARDS.slice(start, end).forEach(card => {
    const options = [{ ...card, correct: true }];
    const pool = CARDS.filter(c => c.key !== card.key).sort(() => Math.random() - 0.5);
    options.push({ ...pool[0], correct: false }, { ...pool[1], correct: false });
    options.sort(() => Math.random() - 0.5);
    quizQuestions.push({ card, options, answered: false, correct: false });
  });
  quizIndex = 0; quizScoreVal = 0;
  document.getElementById('levelSelect').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = quizQuestions[quizIndex];
  document.getElementById('quizScore').textContent = `⭐ ${quizScoreVal}分`;
  document.getElementById('quizProgress').textContent = `第 ${quizIndex + 1}/${quizQuestions.length} 题`;
  document.getElementById('quizProgressBar').style.width = `${((quizIndex + 1) / quizQuestions.length) * 100}%`;
  document.getElementById('quizConcept').textContent = q.card.concept;
  document.getElementById('quizCommon').textContent = q.card.common;
  const el = document.getElementById('quizOptions');
  el.innerHTML = '';
  q.options.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'quiz-option'; b.textContent = opt.key;
    b.onclick = () => selectOption(i);
    el.appendChild(b);
  });
  document.getElementById('quizFeedback').classList.remove('show');
  document.getElementById('quizNextBtn').classList.remove('show');
}

function selectOption(idx) {
  const q = quizQuestions[quizIndex];
  if (q.answered) return;
  q.answered = true;
  document.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);
  q.options.forEach((opt, i) => {
    const btn = document.querySelectorAll('.quiz-option')[i];
    if (opt.correct) btn.classList.add('correct');
    if (i === idx && !opt.correct) btn.classList.add('wrong');
  });
  if (q.options[idx].correct) { q.correct = true; quizScoreVal += 20; document.getElementById('quizScore').textContent = `⭐ ${quizScoreVal}分`; }
  else if (!errorBook.find(e => e.sentencePlain === q.card.sentencePlain)) { errorBook.push({...q.card}); saveState(); updateErrorBadge(); }
  const fb = document.getElementById('quizFeedback');
  fb.className = 'quiz-feedback show ' + (q.correct ? 'correct-fb' : 'wrong-fb');
  document.getElementById('fbLabel').textContent = q.correct ? '✅ 正确！' : '❌ 正确答案：';
  document.getElementById('fbSentence').textContent = q.card.sentencePlain;
  document.getElementById('fbTranslation').textContent = q.card.translation;
  const nb = document.getElementById('quizNextBtn');
  nb.textContent = quizIndex < quizQuestions.length - 1 ? '下一题 ▶' : '查看结果 🏆';
  nb.classList.add('show');
}

function nextQuestion() {
  if (quizIndex < quizQuestions.length - 1) { quizIndex++; renderQuestion(); }
  else showResult();
}

function showResult() {
  const cc = quizQuestions.filter(q => q.correct).length, total = quizQuestions.length;
  levelScores[currentLevel] = { score: quizScoreVal, total: total*20, correct: cc, completed: true };
  saveState();
  const r = cc / total;
  document.getElementById('resultIcon').textContent = r === 1 ? '🏆' : r >= 0.6 ? '🎉' : '💪';
  document.getElementById('resultTitle').textContent = r === 1 ? '完美通关！' : r >= 0.6 ? '顺利过关！' : '继续加油！';
  document.getElementById('resultScore').textContent = `${quizScoreVal}分`;
  document.getElementById('resultDetail').textContent = `答对 ${cc}/${total} 题`;
  document.getElementById('resultOverlay').classList.add('show');
}

function backToLevels() { document.getElementById('resultOverlay').classList.remove('show'); renderLevels(); }
function retryLevel() { document.getElementById('resultOverlay').classList.remove('show'); startLevel(currentLevel); }

function renderErrorBook() {
  const list = document.getElementById('errorList'), empty = document.getElementById('errorEmpty'), btn = document.getElementById('errorClearBtn');
  list.innerHTML = '';
  if (!errorBook.length) { empty.style.display = 'block'; btn.classList.add('hidden'); return; }
  empty.style.display = 'none'; btn.classList.remove('hidden');
  errorBook.forEach((item, i) => {
    const d = document.createElement('div'); d.className = 'error-item fade-in';
    d.innerHTML = `<div class="err-concept">${item.concept} → ${item.common}</div><div class="err-sentence">${item.sentencePlain}</div><div class="err-translation">${item.translation}</div><button class="err-remove" onclick="removeError(${i})">✕</button>`;
    list.appendChild(d);
  });
}

function removeError(i) { errorBook.splice(i, 1); saveState(); updateErrorBadge(); renderErrorBook(); }
function clearErrors() { if (confirm('确定清空错题本吗？')) { errorBook = []; saveState(); updateErrorBadge(); renderErrorBook(); } }
function updateErrorBadge() { const b = document.getElementById('errorBadge'); if (errorBook.length) { b.style.display = ''; b.textContent = errorBook.length; } else b.style.display = 'none'; }

loadState(); renderStudyCard(); updateErrorBadge();
</script>
